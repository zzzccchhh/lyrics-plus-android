name: Build and Release Android App

on:
  push:
    tags:
      - 'v*' # 当推送以 v 开头的标签（例如 v1.0.0）时触发
  workflow_dispatch: # 允许在 GitHub Actions 页面手动触发构建

jobs:
  build:
    name: Build & Sign Release APK
    runs-on: ubuntu-latest

    permissions:
      contents: write # 必须赋予写入权限，以便能自动创建 Release 并上传包

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Grant Execute Permission for Gradlew
        run: chmod +x gradlew

      # 步骤 1：使用官方构建脚本编译 release 版本
      # 该脚本会注入公开统计端点，保证本地官方构建与 GitHub Actions 构建一致。
      # 注意：当前项目中 app/build.gradle.kts 的 release 配置使用的是 debug 签名配置：
      # signingConfig = signingConfigs.getByName("debug")
      # 这意味着它编译出来的 release APK 会自带 debug 签名，可直接安装测试。
      - name: Build with Gradle
        env:
          LYRICS_PLUS_STATS_ENDPOINT: ${{ vars.LYRICS_PLUS_STATS_ENDPOINT }}
        run: bash scripts/assemble-official-release.sh

      # 步骤 2（可选/推荐）：如果后续在 GitHub Secrets 配置了正式的签名密钥，可以使用以下步骤进行二次正式签名
      # 为了防止没有密钥时工作流报错，这里默认不启用。如果您配置了 Secrets，可以取消注释以下步骤，并修改 Gradle 编译为 assembleUnsignedRelease
      # - name: Sign Android Release APK
      #   uses: r0adkll/sign-android-release@v1
      #   id: sign_app
      #   with:
      #     releaseDirectory: app/build/outputs/apk/release
      #     signingKeyBase64: ${{ secrets.SIGNING_KEY }}
      #     alias: ${{ secrets.ALIAS }}
      #     keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
      #     keyPassword: ${{ secrets.KEY_PASSWORD }}

      # 步骤 3：计算编译出的 APK 文件的 SHA-256 哈希值
      - name: Calculate SHA-256 Hash
        id: calc_sha
        run: |
          SHA256=$(sha256sum app/build/outputs/apk/release/app-release.apk | awk '{ print $1 }')
          echo "sha256=$SHA256" >> $GITHUB_OUTPUT

      # 步骤 4：将打包好的 APK 上传并发布到 GitHub Release，同时把 Hash 写入正文
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/build/outputs/apk/release/app-release.apk
          name: Release ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          body: |
            ## 📦 Release ${{ github.ref_name }}
            
            ### 🔒 文件校验和 (SHA-256 Checksums)
            * **app-release.apk**: `${{ steps.calc_sha.outputs.sha256 }}`
            
            > [!TIP]
            > **安全提示：** 您可以在本地运行命令来验证下载的 APK 文件的完整性：
            > * **Windows (PowerShell):** `Get-FileHash app-release.apk -Algorithm SHA256`
            > * **Linux / macOS:** `sha256sum app-release.apk`
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
